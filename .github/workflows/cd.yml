name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (empty = this commit SHA)"
        required: false
        type: string
      skip_deploy:
        description: "Only build and push; skip VPC deploy"
        required: false
        type: boolean
        default: false

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/frontend-landing
  # Compose project directory on the VPC host
  REMOTE_APP_DIR: ${{ vars.REMOTE_APP_DIR || '/srv/projects/frontend-landing' }}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA::12}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:main
          build-args: |
            NEXT_PUBLIC_CELL_NAME=${{ vars.NEXT_PUBLIC_CELL_NAME || 'msb' }}
            NEXT_PUBLIC_APK_URL=${{ vars.NEXT_PUBLIC_APK_URL || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPC
    needs: build-and-push
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_deploy == false)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_PULL_USER: ${{ secrets.GHCR_PULL_USER }}
        with:
          host: ${{ secrets.VPC_SSH_HOST }}
          username: ${{ secrets.VPC_SSH_USER }}
          key: ${{ secrets.VPC_SSH_PRIVATE_KEY }}
          port: ${{ vars.VPC_SSH_PORT || 22 }}
          envs: GHCR_PULL_TOKEN,GHCR_PULL_USER
          script: |
            set -euo pipefail

            APP_DIR="${{ env.REMOTE_APP_DIR }}"
            IMAGE="${{ needs.build-and-push.outputs.image }}"

            if docker info >/dev/null 2>&1; then
              DOCKER="docker"
            else
              DOCKER="sudo docker"
            fi

            echo "Deploying ${IMAGE} in ${APP_DIR}"
            cd "${APP_DIR}"

            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "${GHCR_PULL_TOKEN}" | ${DOCKER} login ghcr.io -u "${GHCR_PULL_USER:-${{ github.repository_owner }}}" --password-stdin
            fi

            export LANDING_IMAGE="${IMAGE}"
            export NEXT_PUBLIC_CELL_NAME="${{ vars.NEXT_PUBLIC_CELL_NAME || 'msb' }}"
            export NEXT_PUBLIC_APK_URL="${{ vars.NEXT_PUBLIC_APK_URL || '' }}"
            # Never pass host port mappings into PORT
            export PORT=3000
            export HOSTNAME=0.0.0.0

            ${DOCKER} compose pull landing
            ${DOCKER} compose up -d --no-build landing

            sleep 3
            curl -fsS -o /dev/null -I "http://127.0.0.1:3000" || {
              echo "Smoke check failed on localhost:3000"
              ${DOCKER} compose logs --tail=80 landing
              exit 1
            }

            echo "Deploy succeeded: ${IMAGE}"