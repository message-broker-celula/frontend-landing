services:
  landing:
    image: ${LANDING_IMAGE:-frontend-landing:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CELL_NAME: ${NEXT_PUBLIC_CELL_NAME:-msb}
        NEXT_PUBLIC_APK_URL: ${NEXT_PUBLIC_APK_URL:-}

    container_name: landing

    restart: unless-stopped

    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production

    ports:
      - "127.0.0.1:3000:3000"
